<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Senhas - Cyber Noir</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Fundo animado com canvas -->
    <div class="bg-canvas">
        <canvas id="bgCanvas"></canvas>
    </div>
    <div class="vignette"></div>

    <!-- Assinatura -->
    <div class="signature">Designed by Matheus</div>

    <!-- Container principal -->
    <div class="container">

        <div class="title">Gerador de Senhas</div>

        <!-- Área da senha -->
        <div class="password-area">
            <input type="text" id="passwordDisplay" readonly value="••••••••••••" />
            <button class="copy-btn" id="copyBtn" aria-label="Copiar senha">
                <svg viewBox="0 0 24 24">
                    <rect x="9" y="9" width="13" height="13" rx="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
            </button>
        </div>

        <!-- Controles -->
        <div class="controls">

            <!-- Slider -->
            <div class="slider-group">
                <div class="slider-header">
                    <span>Comprimento</span>
                    <span id="lengthLabel">16</span>
                </div>
                <input type="range" id="lengthSlider" min="6" max="32" value="16" step="1" />
            </div>

            <!-- Toggles -->
            <div class="toggles">
                <label class="toggle-item active" data-key="numbers">
                    <span class="toggle-track"><span class="toggle-knob"></span></span>
                    Números
                </label>
                <label class="toggle-item active" data-key="special">
                    <span class="toggle-track"><span class="toggle-knob"></span></span>
                    Especiais
                </label>
                <label class="toggle-item active" data-key="uppercase">
                    <span class="toggle-track"><span class="toggle-knob"></span></span>
                    Maiúsculas
                </label>
            </div>
        </div>

        <!-- Botão Gerar -->
        <button class="generate-btn" id="generateBtn">Gerar Senha</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
