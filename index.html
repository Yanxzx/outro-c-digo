<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas | Cyber-Noir</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Fluxos de Dados no Fundo -->
    <div class="data-streams" id="dataStreams"></div>

    <!-- Grade Holográfica -->
    <div class="holographic-grid"></div>

    <!-- Linhas Geométricas -->
    <div class="geometric-lines">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <!-- Container Principal -->
    <div class="main-container">
        <!-- Cabeçalho -->
        <div class="header">
            <div class="header-icon">🔐</div>
            <h1>Gerador de Senhas</h1>
        </div>

        <!-- Exibição da Senha -->
        <div class="password-container">
            <div class="password-display" id="passwordDisplay">
                Clique em Gerar
            </div>
            <button class="copy-btn" id="copyBtn">
                📋 Copiar
            </button>
            <div class="copied-tooltip" id="copiedTooltip">Copiado!</div>
        </div>

        <!-- Medidor de Força -->
        <div class="strength-meter">
            <div class="strength-label">
                <span>Força da Senha</span>
                <span class="strength-value" id="strengthValue">-</span>
            </div>
            <div class="meter-bar">
                <div class="meter-fill" id="meterFill" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Controle de Comprimento -->
        <div class="slider-container">
            <div class="slider-header">
                <span class="slider-label">Comprimento</span>
                <span class="length-value" id="lengthValue">16</span>
            </div>
            <div class="custom-slider">
                <input type="range" 
                       id="lengthSlider" 
                       min="8" 
                       max="32" 
                       value="16">
            </div>
            <div class="slider-ticks">
                <span>8</span>
                <span>12</span>
                <span>16</span>
                <span>20</span>
                <span>24</span>
                <span>28</span>
                <span>32</span>
            </div>
        </div>

        <!-- Chaves de Opções -->
        <div class="toggles-container">
            <div class="toggle-item">
                <span class="toggle-label">Incluir Números</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeNumbers" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="toggle-item">
                <span class="toggle-label">Caracteres Especiais</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeSpecial" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="toggle-item">
                <span class="toggle-label">Letras Maiúsculas</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeUppercase" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <!-- Botão Gerar -->
        <button class="generate-btn" id="generateBtn">
            ⚡ Gerar Senha
        </button>

        <!-- Assinatura -->
        <div class="signature">
            Criado por Matheus
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
